kind = "web"
previewPath = "/"
title = "Only Creators"
version = "1.0.0"
id = "artifacts/only-creators"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22998

[services.development]
run = "pnpm --filter @workspace/only-creators run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/only-creators", "run", "build" ]
publicDir = "artifacts/only-creators/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22998"
BASE_PATH = "/"
